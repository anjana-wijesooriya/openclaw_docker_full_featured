name: Build & Push Docker Image

on:
  # Daily check for new base image
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC every day

  # Manual trigger
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  BASE_IMAGE: ghcr.io/openclaw/openclaw:latest

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Check for new base image
        id: base-check
        run: |
          # Get current digest of the base image
          BASE_DIGEST=$(docker manifest inspect ${{ env.BASE_IMAGE }} 2>/dev/null | jq -r '.manifests[0].digest // .config.digest' 2>/dev/null || echo "unknown")
          echo "Base image digest: $BASE_DIGEST"
          echo "base_digest=$BASE_DIGEST" >> "$GITHUB_OUTPUT"

          # Get digest stored in our last build (from image label)
          OUR_DIGEST=$(docker manifest inspect ${{ env.IMAGE_NAME }}:latest 2>/dev/null | jq -r '.manifests[0].annotations["base.digest"] // "none"' 2>/dev/null || echo "none")
          echo "Our stored digest: $OUR_DIGEST"
          echo "our_digest=$OUR_DIGEST" >> "$GITHUB_OUTPUT"

          if [ "$BASE_DIGEST" = "$OUR_DIGEST" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Base image unchanged — skipping build."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New base image or manual/push trigger — building."
          fi

      - name: Checkout
        if: steps.base-check.outputs.changed == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.base-check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.base-check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        if: steps.base-check.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            base.digest=${{ steps.base-check.outputs.base_digest }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
